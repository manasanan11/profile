<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            margin: 20px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover; /* จัดการรูปภาพให้พอดีวงกลมโดยไม่เสียสัดส่วน */
            border: 4px solid #4f46e5;
            margin-bottom: 15px;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin: 10px 0 5px;
        }

        .profile-id {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .info-container {
            text-align: left;
            margin-top: 20px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }

        .info-item {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }

        .info-label {
            font-weight: 600;
            color: #4b5563;
            width: 100px;
            flex-shrink: 0;
        }

        .info-value {
            color: #1f2937;
            word-break: break-word; /* ป้องกันข้อความยาวเกินกรอบ */
        }
        
        .info-value a {
            color: #4f46e5;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">

        <div class="profile-name">นางสาวมนัศนันท์ ชินอักษร</div>
        <div class="profile-id">รหัสนักศึกษา: 694245017</div>

        <div class="info-container">
            <div class="info-item">
                <div class="info-label">เบอร์โทรศัพท์:</div>
                <div class="info-value"><a href="tel:0928873541">0928873541</a></div>

            <div class="info-item">

                <div class="info-value">วิทยาศาสตร์และเทคโนโลยี</div>
